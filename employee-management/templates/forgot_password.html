{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-4 text-center">パスワード初期化</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label for="target_employee_code" class="form-label">対象社員コード</label>
                        <input type="text" class="form-control" id="target_employee_code" name="target_employee_code" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="admin_employee_code" class="form-label">管理者社員コード</label>
                        <input type="text" class="form-control" id="admin_employee_code" name="admin_employee_code" required>
                    </div>
                    <div class="mb-4">
                        <label for="admin_password" class="form-label">管理者パスワード</label>
                        <input type="password" class="form-control" id="admin_password" name="admin_password"
                               autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">初期化</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('login') }}">ログイン画面へ戻る</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
