{% extends "layout.html" %}

{% block content %}
<div class="header-title d-flex justify-content-between align-items-center">
    <h2>役職一覧</h2>
    <a href="{{ url_for('position_new') }}" class="btn btn-success">
        <i class="bi bi-plus-lg"></i> 新規登録
    </a>
</div>

<div class="card mb-3 bg-light">
    <div class="card-body">
        <form method="GET" action="{{ url_for('position_list') }}" class="row g-2 align-items-center">
            <div class="col-md-3">
                <input type="text" class="form-control" name="code" placeholder="役職コード" value="{{ request.args.get('code', '') }}">
            </div>
            <div class="col-md-4">
                <input type="text" class="form-control" name="name" placeholder="役職名(曖昧)" value="{{ request.args.get('name', '') }}">
            </div>
            <div class="col-md-2 d-flex gap-1">
                <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-search"></i> 検索</button>
                <a href="{{ url_for('position_list') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-counterclockwise"></i></a>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>役職コード</th>
                    <th>役職名</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for pos in positions %}
                <tr>
                    <td>{{ pos.position_code }}</td>
                    <td>{{ pos.name }}</td>
                    <td>
                        <a href="{{ url_for('position_edit', id=pos.id) }}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i> 編集
                        </a>
                        <form action="{{ url_for('position_delete', id=pos.id) }}" method="POST" class="d-inline" onsubmit="return confirm('本当に削除しますか？');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i> 削除
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center">登録されている役職はありません。</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="mt-3">
    <a href="{{ url_for('index') }}" class="btn btn-secondary">メインメニューへ戻る</a>
</div>
{% endblock %}
