{% extends "layout.html" %}

{% block content %}
<div class="header-title">
    <h2>メインメニュー</h2>
</div>

<div class="row g-4 row-cols-1 row-cols-md-2">
    {% if has_permission('master_write') %}
    <div class="col">
        <div class="card h-100 text-center shadow-sm hover-effect hover-warning">
            <div class="card-body d-flex flex-column align-items-center p-5">
                <i class="bi bi-list-columns-reverse text-warning mb-3" style="font-size: 3rem;"></i>
                <h5 class="card-title fw-bold">勘定科目マスタ</h5>
                <p class="card-text text-muted mb-4">勘定科目の登録・更新・表示順管理を行います。</p>
                <div class="mt-auto">
                    <a href="{{ url_for('account_list') }}" class="btn btn-warning text-white" style="position: relative; z-index: 2;">マスタを表示</a>
                </div>
                <a href="{{ url_for('account_list') }}" class="stretched-link"></a>
            </div>
        </div>
    </div>
    {% endif %}
    <div class="col">
        <div class="card h-100 text-center shadow-sm hover-effect hover-success">
            <div class="card-body d-flex flex-column align-items-center p-5">
                <i class="bi bi-pencil-square text-success mb-3" style="font-size: 3rem;"></i>
                <h5 class="card-title fw-bold">経費一括入力</h5>
                <p class="card-text text-muted mb-4">月次・日次の経費データを一括で登録します。</p>
                <div class="mt-auto">
                    <a href="{{ url_for('expense_entry') }}" class="btn btn-success" style="position: relative; z-index: 2;">入力画面へ</a>
                </div>
                <a href="{{ url_for('expense_entry') }}" class="stretched-link"></a>
            </div>
        </div>
    </div>
    <div class="col">
        <div class="card h-100 text-center shadow-sm hover-effect hover-info">
            <div class="card-body d-flex flex-column align-items-center p-5">
                <i class="bi bi-eraser-fill text-info mb-3" style="font-size: 3rem;"></i>
                <h5 class="card-title fw-bold">経費データ修正</h5>
                <p class="card-text text-muted mb-4">登録済みの経費データを検索し、内容を修正します。</p>
                <div class="mt-auto">
                    <a href="{{ url_for('correction_search') }}" class="btn btn-info text-white" style="position: relative; z-index: 2;">一覧を表示</a>
                </div>
                <a href="{{ url_for('correction_search') }}" class="stretched-link"></a>
            </div>
        </div>
    </div>
    <div class="col">
        <div class="card h-100 text-center shadow-sm hover-effect hover-primary">
            <div class="card-body d-flex flex-column align-items-center p-5">
                <i class="bi bi-search text-primary mb-3" style="font-size: 3rem;"></i>
                <h5 class="card-title fw-bold">経費データ検索・出力</h5>
                <p class="card-text text-muted mb-4">経費データの検索、およびCSV出力を行います。</p>
                <div class="mt-auto">
                    <a href="{{ url_for('expense_search') }}" class="btn btn-primary" style="position: relative; z-index: 2;">検索画面へ</a>
                </div>
                <a href="{{ url_for('expense_search') }}" class="stretched-link"></a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
