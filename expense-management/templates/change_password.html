{% extends "layout.html" %}

{% block content %}
<div class="header-title">
    <h2>パスワード変更</h2>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="current_password" class="form-label">現在のパスワード</label>
                        <input type="password" class="form-control" id="current_password" name="current_password"
                               autocomplete="current-password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">新しいパスワード</label>
                        <input type="password" class="form-control" id="new_password" name="new_password"
                               autocomplete="new-password" required>
                    </div>
                    <div class="mb-4">
                        <label for="new_password_confirm" class="form-label">新しいパスワード確認</label>
                        <input type="password" class="form-control" id="new_password_confirm" name="new_password_confirm"
                               autocomplete="new-password" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-system">変更</button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">キャンセル</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
