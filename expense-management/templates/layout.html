<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>経費管理システム</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --system-color: #8e44ad;
        }
        body { 
            background-color: #f8f9fa; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }
        .navbar { 
            margin-bottom: 2rem; 
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
            background-color: var(--system-color) ! aspiration;
        }
        .bg-system {
            background-color: var(--system-color) !important;
        }
        .text-system {
            color: var(--system-color) !important;
        }
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 1.5rem;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .header-title {
            border-left: 5px solid var(--system-color);
            padding-left: 1rem;
            margin-bottom: 2rem;
        }
        .btn-system {
            background-color: var(--system-color);
            color: white;
        }
        .btn-system:hover {
            background-color: #7d3c98;
            color: white;
        }
        .hover-effect {
            transition: all 0.3s ease;
        }
        .hover-effect:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        }
        .hover-system:hover {
            border-bottom: 5px solid var(--system-color);
        }
        .hover-warning:hover { border-bottom: 5px solid #ffc107; }
        .hover-success:hover { border-bottom: 5px solid #198754; }
        .hover-info:hover { border-bottom: 5px solid #0dcaf0; }
        .hover-primary:hover { border-bottom: 5px solid #0d6efd; }
        /* Hide yyyy/mm/dd placeholder in date inputs */
        input[type="date"]::-webkit-datetime-edit,
        input[type="month"]::-webkit-datetime-edit { 
            color: transparent; 
        }
        
        /* Show text on focus or when it has a value */
        input[type="date"]:focus::-webkit-datetime-edit,
        input[type="date"].has-value::-webkit-datetime-edit,
        input[type="month"]:focus::-webkit-datetime-edit,
        input[type="month"].has-value::-webkit-datetime-edit { 
            color: inherit; 
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-system">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">経費管理システム</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- Navigation links removed as per request -->
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="flash-container">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Global function to show flash messages dynamically (e.g. from AJAX or validation)
        function showFlashMessage(message, category) {
            const container = document.getElementById('flash-container');
            if (!container) return;

            // Check if exact same message already exists to prevent duplicates
            const existingMessages = container.querySelectorAll('.alert');
            for (let msg of existingMessages) {
                if (msg.textContent.includes(message)) {
                    return; // Already showing this message
                }
            }

            const alertClass = (category === 'error' || category === 'danger') ? 'danger' : 'success';
            const alertHtml = `
                <div class="alert alert-${alertClass} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', alertHtml);
            
            // Auto-scroll to top to show message
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Date input placeholder handling
            function updateDateInputClass(input) {
                if (input.value) {
                    input.classList.add('has-value');
                } else {
                    input.classList.remove('has-value');
                }
            }

            document.querySelectorAll('input[type="date"], input[type="month"]').forEach(function(input) {
                updateDateInputClass(input);
                input.addEventListener('change', function() {
                    updateDateInputClass(this);
                });
            });

            // Amount input comma formatting
            function formatNumberWithCommas(value) {
                const num = value.replace(/[^0-9]/g, '');
                if (num === '') return '';
                return Number(num).toLocaleString();
            }

            function applyAmountFormatting(input) {
                const originalValue = input.value;
                const formattedValue = formatNumberWithCommas(originalValue);
                if (originalValue !== formattedValue) {
                    input.value = formattedValue;
                }
            }

            document.querySelectorAll('.amount-input').forEach(function(input) {
                // Format initial value
                applyAmountFormatting(input);

                input.addEventListener('input', function(e) {
                    // Save cursor position
                    const cursorPosition = this.selectionStart;
                    const oldLength = this.value.length;
                    
                    applyAmountFormatting(this);
                    
                    // Adjust cursor position
                    const newLength = this.value.length;
                    this.setSelectionRange(cursorPosition + (newLength - oldLength), cursorPosition + (newLength - oldLength));
                });

                input.addEventListener('blur', function() {
                    applyAmountFormatting(this);
                });
            });
        });
    </script>
</body>
</html>
