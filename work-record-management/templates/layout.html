<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業実績管理システム</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }
        .navbar {
            background-color: #e67e22 !important; /* Work Record: Orange */
            margin-bottom: 2rem;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
        }
        /* Hover effects for Menu Cards by Color */
        .card.hover-effect:hover {
            transform: translateY(-4px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1) !important;
        }

        /* Prevent gray artifacts around text by explicitly cleaning link styles */
        .card .stretched-link,
        .card .stretched-link:hover,
        .card .stretched-link:focus,
        .card .stretched-link:active {
            text-decoration: none !important;
            background-color: transparent !important;
            box-shadow: none !important;
            outline: none !important;
        }

        /* Solid button hover backgrounds - matched to themes */
        .card.hover-warning:hover { background-color: #fff9db !important; }
        .card.hover-success:hover { background-color: #f0fff4 !important; }
        .card.hover-info:hover    { background-color: #f0f7ff !important; }
        .card.hover-primary:hover { background-color: #f5f7ff !important; }

        .header-title {
            border-left: 5px solid #e67e22; /* Orange */
            padding-left: 1rem;
            margin-bottom: 2rem;
        }
        .back-nav {
            margin-bottom: 1.5rem;
        }
        /* Date Input display logic */
        .date-empty::-webkit-datetime-edit { color: transparent !important; }
        .date-empty::-webkit-calendar-picker-indicator { opacity: 0; }
        input[type="date"]::-webkit-datetime-edit { color: inherit; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">作業実績管理システム</a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
