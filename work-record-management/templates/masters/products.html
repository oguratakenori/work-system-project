{% extends "layout.html" %}

{% block content %}
<div class="back-nav d-flex gap-2">
    <a href="{{ url_for('masters_menu') }}" class="btn btn-secondary shadow-sm">
        <i class="bi bi-arrow-left"></i> マスタ管理へ戻る
    </a>
    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary shadow-sm">
        <i class="bi bi-house"></i> メニューへ戻る
    </a>
</div>

<h2 class="header-title">製品マスタ管理</h2>

<div class="card mb-4 shadow-sm border-0">
    <div class="card-body">
        <h5 class="card-title fw-bold text-muted mb-3"><i class="bi bi-box-seam me-2"></i>製品登録</h5>
        <form method="POST" class="row g-3">
            <div class="col-md-3">
                <label class="form-label small fw-bold">製品番号</label>
                <input type="text" name="product_no" class="form-control" placeholder="P000" required>
            </div>
            <div class="col-md-5">
                <label class="form-label small fw-bold">製品名</label>
                <input type="text" name="name" class="form-control" placeholder="製品名" required>
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold">製品単価</label>
                <div class="input-group">
                    <input type="number" name="unit_price" class="form-control" placeholder="0">
                    <span class="input-group-text">円</span>
                </div>
            </div>
            <div class="col-auto d-flex align-items-end">
                <button type="submit" class="btn btn-primary px-4 shadow-sm">登録</button>
            </div>
        </form>
    </div>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>製品番号</th>
            <th>製品名</th>
            <th>単価</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for prod in products %}
        <tr>
            <td>{{ prod.product_no }}</td>
            <td>{{ prod.name }}</td>
            <td>{{ "{:,}".format(prod.unit_price) }}円</td>
            <td>
                <button type="button" class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#editModal{{ prod.id }}">
                    修正
                </button>

                <!-- Edit Modal -->
                <div class="modal fade" id="editModal{{ prod.id }}" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <form action="{{ url_for('edit_product', id=prod.id) }}" method="POST">
                                <div class="modal-header">
                                    <h5 class="modal-title">製品情報修正</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body text-start">
                                    <div class="mb-3">
                                        <label class="form-label">製品番号</label>
                                        <input type="text" name="product_no" value="{{ prod.product_no }}" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">製品名</label>
                                        <input type="text" name="name" value="{{ prod.name }}" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">製品単価</label>
                                        <div class="input-group">
                                            <input type="number" name="unit_price" value="{{ prod.unit_price }}" class="form-control">
                                            <span class="input-group-text">円</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                                    <button type="submit" class="btn btn-primary">更新</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <a href="{{ url_for('delete_product', id=prod.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('削除しますか？')">削除</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
