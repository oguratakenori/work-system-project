{% extends "layout.html" %}

{% block content %}
<div class="back-nav">
    <a href="{{ url_for('index') }}" class="btn btn-secondary shadow-sm">
        <i class="bi bi-arrow-left"></i> メニューへ戻る
    </a>
</div>

<h2 class="header-title">マスタ管理</h2>

<div class="row g-4 justify-content-center mt-2">
    <div class="col-md-6 col-lg-4">
        <a href="{{ url_for('manage_departments') }}" class="card master-card shadow-sm h-100 text-decoration-none">
            <div class="card-body text-center p-5">
                <i class="bi bi-building master-icon text-primary mb-3"></i>
                <h4 class="card-title text-dark">部署マスタ</h4>
                <p class="text-muted small">部署コードと名称の管理</p>
            </div>
        </a>
    </div>
    <div class="col-md-6 col-lg-4">
        <a href="{{ url_for('manage_works') }}" class="card master-card shadow-sm h-100 text-decoration-none">
            <div class="card-body text-center p-5">
                <i class="bi bi-tools master-icon text-success mb-3"></i>
                <h4 class="card-title text-dark">作業マスタ</h4>
                <p class="text-muted small">作業コードと名称の管理</p>
            </div>
        </a>
    </div>
</div>

<style>
    .master-card {
        transition: transform 0.2s, box-shadow 0.2s;
        border: none;
        border-radius: 15px;
    }
    .master-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }
    .master-icon {
        font-size: 3rem;
        display: block;
    }
</style>
{% endblock %}
