{% extends "layout.html" %}

{% block content %}
<style>
    .input-card {
        border-top: 5px solid #ffc107; /* Warning/Yellow accent for edit */
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .form-label {
        color: #495057;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.5rem;
    }
    .form-control, .form-select {
        border-radius: 8px;
        padding: 0.6rem 1rem;
        border: 1px solid #dee2e6;
        transition: all 0.2s ease;
    }
    .form-control:focus, .form-select:focus {
        border-color: #ffc107;
        box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.1);
    }
    .input-group-text {
        background-color: #f8f9fa;
        border-radius: 8px;
    }
    .btn-submit {
        padding: 0.8rem;
        font-weight: bold;
        border-radius: 8px;
        letter-spacing: 1px;
    }
</style>

<div class="back-nav">
    <a href="{{ url_for('performance_list') }}" class="btn btn-outline-secondary btn-sm shadow-sm">
        <i class="bi bi-arrow-left"></i> 一覧へ戻る
    </a>
</div>

<div class="row justify-content-center mt-3">
    <div class="col-md-9 col-lg-7">
        <div class="card input-card border-0">
            <div class="card-header bg-transparent border-0 pt-4 px-4">
                <h3 class="fw-bold text-dark mb-0">
                    <i class="bi bi-pencil-square text-warning me-2"></i>作業実績修正
                </h3>
                <p class="text-muted small mt-2">修正内容を正確に入力してください。</p>
            </div>
            <div class="card-body p-4 pt-2">
                <form method="POST" id="performanceForm">
                    <div class="row g-3">
                        <!-- 1. 作業日 -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">作業日</label>
                            <input type="date" name="work_date" class="form-control" max="9999-12-31" value="{{ record.work_date }}" required>
                        </div>

                        <!-- 2. 社員コード -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">社員</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <input type="text" name="employee_code" id="employee_code" class="form-control" style="flex: 1;" placeholder="コード" list="employeeList" autocomplete="off" value="{{ record.employee_code }}" required>
                                <input type="text" id="employee_name" class="form-control bg-light text-muted" style="flex: 2;" placeholder="社員名" readonly>
                            </div>
                            <datalist id="employeeList"></datalist>
                        </div>

                        <!-- 3. 部署 -->
                        <div class="col-12">
                            <label class="form-label fw-bold">所属部署</label>
                            <select name="department_id" id="department_id" class="form-select" required>
                                <option value="">部署を選択してください</option>
                                {% for dept in departments %}
                                <option value="{{ dept.id }}" {{ 'selected' if dept.id == current_dept_id else '' }}>{{ dept.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- 4. 作業 -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">作業内容</label>
                            <select name="work_code" id="work_code" class="form-select" required>
                                <option value="{{ record.work_code }}">{{ record.work_code }}</option>
                            </select>
                        </div>

                        <!-- 5. 製品 -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">対象製品</label>
                            <select name="product_code" id="product_code" class="form-select" required>
                                <option value="{{ record.product_code }}">{{ record.product_code }}</option>
                            </select>
                        </div>

                        <!-- 6. 作業時間 -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">作業時間</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-clock"></i></span>
                                <input type="text" name="work_hours" id="work_hours" class="form-control" placeholder="例: 0830" value="{{ '%.2f'|format(record.work_hours) }}" required>
                            </div>
                        </div>

                        <!-- 7. 数量 -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">生産数量</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-hash"></i></span>
                                <input type="text" name="quantity" id="quantity" class="form-control" placeholder="0" value="{{ record.quantity }}" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-warning btn-lg btn-submit shadow-sm">
                            <i class="bi bi-check-circle me-2"></i>更新する
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Employee Autocomplete
    const empInput = document.getElementById('employee_code');
    const empList = document.getElementById('employeeList');
    const empNameInput = document.getElementById('employee_name');
    let currentEmployees = [];

    async function loadAllEmployees() {
        try {
            const resp = await fetch('/api/employees');
            const data = await resp.json();
            currentEmployees = data;
            
            // Initial name set
            const selectedEmp = currentEmployees.find(emp => emp.employee_code === empInput.value);
            if (selectedEmp) {
                empNameInput.value = `${selectedEmp.last_name} ${selectedEmp.first_name}`;
            }
        } catch (err) {
            console.error('Error fetching employees:', err);
        }
    }
    loadAllEmployees();

    empInput.addEventListener('input', (e) => {
        const val = e.target.value;
        if (val.length >= 1) {
            if (empList.children.length === 0) {
                currentEmployees.forEach(emp => {
                    const option = document.createElement('option');
                    option.value = emp.employee_code;
                    option.textContent = `${emp.employee_code}：${emp.last_name} ${emp.first_name}`;
                    empList.appendChild(option);
                });
            }
        } else {
            empList.innerHTML = '';
        }

        const selectedEmp = currentEmployees.find(emp => emp.employee_code === val);
        if (selectedEmp) {
            empNameInput.value = `${selectedEmp.last_name} ${selectedEmp.first_name}`;
        } else {
            empNameInput.value = '';
        }
    });

    // 2. Cascading Dropdowns
    const deptSelect = document.getElementById('department_id');
    const workSelect = document.getElementById('work_code');
    const productSelect = document.getElementById('product_code');

    async function updateDropdowns(deptId, initialWorkCode = null, initialProductCode = null) {
        if (!deptId) {
            workSelect.disabled = true;
            productSelect.disabled = true;
            return;
        }

        try {
            const [wResp, pResp] = await Promise.all([
                fetch(`/api/works?department_id=${deptId}`),
                fetch(`/api/products?department_id=${deptId}`)
            ]);
            
            const [wData, pData] = await Promise.all([wResp.json(), pResp.json()]);

            workSelect.innerHTML = '<option value="">作業を選択してください</option>';
            wData.forEach(w => {
                const option = document.createElement('option');
                option.value = w.work_code;
                option.textContent = `${w.work_code}：${w.name}`;
                if (initialWorkCode && w.work_code === initialWorkCode) option.selected = true;
                workSelect.appendChild(option);
            });
            workSelect.disabled = false;

            productSelect.innerHTML = '<option value="">製品を選択してください</option>';
            pData.forEach(p => {
                const option = document.createElement('option');
                option.value = p.product_code;
                option.textContent = `${p.product_code}：${p.name}`;
                if (initialProductCode && p.product_code === initialProductCode) option.selected = true;
                productSelect.appendChild(option);
            });
            productSelect.disabled = false;
        } catch (err) {
            console.error('Error fetching data:', err);
        }
    }

    // Initial load for Edit mode
    if (deptSelect.value) {
        updateDropdowns(deptSelect.value, "{{ record.work_code }}", "{{ record.product_code }}");
    }

    deptSelect.addEventListener('change', () => {
        updateDropdowns(deptSelect.value);
    });

    // 3. Time Formatter
    const hoursInput = document.getElementById('work_hours');
    hoursInput.addEventListener('blur', (e) => {
        let val = e.target.value.replace(/[^0-9]/g, '');
        if (val.length === 0) return;
        if (val.length === 3) val = '0' + val;
        if (val.length === 4) {
            e.target.value = `${val.substring(0, 2)}:${val.substring(2, 4)}`;
        }
    });

    // 4. Quantity Formatter
    const qtyInput = document.getElementById('quantity');
    qtyInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/[^0-9]/g, '');
        if (val === '') {
            e.target.value = '';
            return;
        }
        e.target.value = Number(val).toLocaleString();
    });

    // Initial format for quantity
    if (qtyInput.value) {
        qtyInput.value = Number(qtyInput.value.replace(/,/g, '')).toLocaleString();
    }

    document.getElementById('performanceForm').addEventListener('submit', (e) => {
        const val = qtyInput.value.replace(/,/g, '');
        qtyInput.value = val;
    });
</script>
{% endblock %}
