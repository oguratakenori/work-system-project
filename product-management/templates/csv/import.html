{% extends "layout.html" %}
{% block content %}
<h2>製品データ CSVインポート</h2>
<div class="card mt-3 shadow-sm">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">CSVファイルを選択</label>
                <input class="form-control" type="file" name="file" accept=".csv" required>
                <div class="form-text">
                    フォーマット: department_code, product_code, name, price, registered_date, abolished_date, notes
                </div>
            </div>
            <button type="submit" class="btn btn-primary">プレビュー表示</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">キャンセル</a>
        </form>
    </div>
</div>
{% endblock %}
